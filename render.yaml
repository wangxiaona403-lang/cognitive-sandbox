services:
  # Next.js Web 服务
  - type: web
    name: cognitive-sandbox
    env: node
    buildCommand: |
      npx prisma generate &&
      npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cognitive-sandbox-db
          property: connectionString
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_BASE_URL
        sync: false
      - key: ZHIPU_MODEL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false

  # PostgreSQL 数据库
  - type: pserv
    name: cognitive-sandbox-db
    plan: free
    env: postgres
    region: singapore
    ipAllowList: []
